<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Minimal typing trainer for QWERTY, Dvorak, Colemak-DH, and Baremak." />
    <title>type</title>
    <link rel="stylesheet" href="/main.css" />
    <script type="module" src="/main.js"></script>
  </head>
  <body>
    <main id="app" class="shell" tabindex="0" aria-label="Typing trainer">
      <nav class="topline" aria-label="Typing controls">
        <div id="layouts" class="layouts" role="group" aria-label="Layouts"></div>
        <div id="stats" class="stats" aria-live="polite">0 wpm / 100 % / 0s</div>
      </nav>
      <div class="stage">
        <aside class="sidebar">
          <div id="levels" class="levels" role="group" aria-label="Levels"></div>
        </aside>
        <section id="type-window" class="type-window">
          <div id="word-stream" class="word-stream"></div>
        </section>
        <div class="rail"></div>
      </div>
    </main>
  </body>
</html>
